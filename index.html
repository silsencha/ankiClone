<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Word Catalog</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="drawer-label">
        <div style="display: flex; align-items: center; gap: 12px">
          <div class="brass"></div>
          <div class="drawer-title">
            Word Catalog<small>your own vocabulary deck</small>
          </div>
        </div>
        <div class="due-stamp">DUE TODAY <b id="dueCount">–</b></div>
      </div>

      <div class="tabs">
        <div class="tab active" data-tab="study">Study</div>
        <div class="tab" data-tab="add">Add Word</div>
        <div class="tab" data-tab="manage">Manage</div>
      </div>

      <div class="panel" id="panel-study">
        <div id="studyArea"><div class="loading">Opening the drawer…</div></div>
      </div>

      <div class="panel" id="panel-add" hidden>
        <label for="frontInput">Word / Front</label>
        <input
          type="text"
          id="frontInput"
          placeholder="e.g. ephemeral"
          maxlength="200"
        />
        <label for="backInput">Meaning / Back</label>
        <textarea
          id="backInput"
          rows="3"
          placeholder="e.g. lasting for a very short time"
        ></textarea>
        <button class="add-btn" id="addBtn">File this card</button>
        <div class="form-msg" id="formMsg"></div>
      </div>

      <div class="panel" id="panel-manage" hidden>
        <div class="search-row">
          <input
            type="text"
            id="searchInput"
            placeholder="Search your cards…"
          />
        </div>
        <div class="count-line" id="manageCount"></div>
        <ul class="manage-list" id="manageList"></ul>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
